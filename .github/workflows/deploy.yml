name: CI/CD Pipeline

on:
  push:
    branches:
      - master
    paths-ignore:
      - README.md

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: cloudmember

jobs:
  # CI: Build & Test
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: build/libs/*.jar

  # CD: Docker Build & Push to ECR
  docker:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: build/libs

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/arm64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >> $GITHUB_OUTPUT

  # CD: Deploy to EC2
  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR login password
        id: ecr-login
        run: |
          echo "password=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})" >> $GITHUB_OUTPUT

      - name: Deploy via Bastion SSH (with Health Check)
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          ECR_PASSWORD: ${{ steps.ecr-login.outputs.password }}
          PRIVATE_EC2_HOST: ${{ secrets.PRIVATE_EC2_HOST }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: ${{ secrets.BASTION_USERNAME }}
          key: ${{ secrets.BASTION_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_PASSWORD,ECR_REPOSITORY,PRIVATE_EC2_HOST
          script: |
            echo "Deploying directly on Bastion context..."
          
            ssh -i ec2-key.pem ec2-user@$PRIVATE_EC2_HOST << 'EOF'
            
            set -e
          
            aws ecr get-login-password --region ap-northeast-2 \
            | docker login --username AWS --password-stdin $ECR_REGISTRY

            echo "Pull latest image"
            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest

            echo "Start new container (temporary)"
            docker run -d --name cloudmember_new -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              $ECR_REGISTRY/$ECR_REPOSITORY:latest
            
            echo "Waiting for application startup..."
            sleep 15

            echo "Health check..."
            if curl -f http://localhost:8080/actuator/health; then
              echo "Health check passed ✅"

              echo "Switching containers"
              docker stop cloudmember || true
              docker rm cloudmember || true

              docker rename cloudmember_new cloudmember

              echo "Deployment successful 🚀"
            else
              echo "Health check failed ❌"

              docker stop cloudmember_new || true
              docker rm cloudmember_new || true

              exit 1
            fi

            EOF