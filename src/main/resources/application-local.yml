spring:
  h2:
    console:
      enabled: true                                     # H2 ? ?? ???
      path: /h2-console                                 # H2 ??? ??? ??

  cloud:
    aws:
      s3:
        enabled: false
      parameterstore:
        enabled: false

  datasource:
    url: jdbc:h2:mem:test                               # ?????? URL
    username: sa                                        # ?????? ?? ??? ??
    password:                                           # ?????? ?? ????
    driver-class-name: org.h2.Driver                    # H2 JDBC ???? ??? ??

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show-sql: true

management:
  endpoint:
    health:
      show-details: always