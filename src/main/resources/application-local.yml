spring:
  h2:
    console:
      enabled: true
      path: /h2-console

  cloud:
    aws:
      s3:
        enabled: false
      parameterstore:
        enabled: false

  datasource:
    url: jdbc:h2:mem:test
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show-sql: true

management:
  endpoint:
    health:
      show-details: always